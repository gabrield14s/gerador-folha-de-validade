<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Folha de Validade</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Mensagem de erro -->
  <div id="mensagemErro" class="mensagem-erro" style="display:none;"></div>
  <!-- Fim da mensagem de erro -->

  <div class="container">

    <header>
      <h1>📦 Gerador de Folha de Validade</h1>
      <p>Controle de produtos próximos ao vencimento</p>
    </header>

    <section class="card">

      <h2>Cadastrar Produto</h2>

      <div class="form-group">
        <label>Código de Barras</label>
        <input type="text" id="codigo" placeholder="Bipe ou digite o código">
      </div>

      <div class="form-group">
        <label>Descrição do Produto</label>
        <input type="text" id="descricao" placeholder="Digite a descrição">
      </div>

      <div class="grid">

        <div class="form-group">
          <label>Validade</label>
          <input type="date" id="validade">
        </div>

        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="quantidade" placeholder="0">
        </div>

      </div>

      <div class="buttons">
        <button id="btnAdicionar">
          ➕ Adicionar Produto
        </button>

        <button id="btnLimpar" class="secondary">
          Limpar
        </button>
      </div>

    </section>

    <section class="card">

      <div class="table-header">
        <h2>Produtos Adicionados</h2>
        <span id="totalProdutos">0 produtos</span>
      </div>

      <table>

        <thead>
          <tr>
            <th>Código</th>
            <th>Produto</th>
            <th>Validade</th>
            <th>Dias</th>
            <th>Qtd</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="tabelaProdutos">
        </tbody>

      </table>

    </section>

    <section class="actions">
      <button id="btnPdf">
        📄 Gerar PDF
      </button>
    </section>

  </div>

  <!-- Modal de edição -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>✏️ Editar Produto</h3>

      <div class="form-group">
        <label>Código de Barras</label>
        <input type="text" id="editCodigo">
      </div>

      <div class="form-group">
        <label>Descrição do Produto</label>
        <input type="text" id="editDescricao">
      </div>

      <div class="grid">
        <div class="form-group">
          <label>Validade</label>
          <input type="date" id="editValidade">
        </div>
        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="editQuantidade">
        </div>
      </div>

      <div class="buttons">
        <button id="btnSalvarEdicao">💾 Salvar</button>
        <button id="btnCancelarEdicao" class="secondary">Cancelar</button>
      </div>
    </div>
  </div>
  <!-- Fim do Modal de edição -->

  <script src="appRenderer.js"></script>

</body>

</html>
